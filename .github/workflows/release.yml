name: Release and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: askey-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: askey-darwin-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: askey.exe
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.platform.target }}/release/askey.exe dist/askey.exe
          elif [ "${{ matrix.platform.os }}" = "ubuntu-latest" ]; then
            cp target/${{ matrix.platform.target }}/release/askey dist/askey-linux-amd64
          else
            cp target/${{ matrix.platform.target }}/release/askey dist/askey-darwin-amd64
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check Files
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/askey.exe
            dist/askey-linux-amd64
            dist/askey-darwin-amd64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  winget:
    name: Publish to WinGet
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Submit to WinGet Community Repo
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Kalmix.Askey
          installers-regex: 'askey\.exe$'
          token: ${{ secrets.WINGET_ACC_TOKEN }}
